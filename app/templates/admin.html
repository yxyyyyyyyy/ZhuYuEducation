<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>祝余教育 - 管理员后台</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: #1f2329;
      background: #f5f7fa;
    }

    .login-gate {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e8f0ff 0%, #f5f7fa 50%, #eef8f3 100%);
    }
    .login-card {
      background: #fff;
      border: 1px solid #dee0e3;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      padding: 36px 32px;
      max-width: 400px;
      width: calc(100vw - 32px);
    }
    .login-card .brand-chip {
      display: inline-block;
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #1456f0;
      margin-bottom: 4px;
    }
    .login-card h1 { font-size: 24px; margin: 8px 0; }
    .login-card .hint { color: #646a73; margin-bottom: 20px; font-size: 13px; }
    .login-card .text-link { display: block; text-align: center; margin-top: 16px; color: #1456f0; text-decoration: none; font-size: 13px; }
    .login-card .text-link:hover { text-decoration: underline; }

    input, select, textarea {
      width: 100%;
      border: 1px solid #dee0e3;
      border-radius: 8px;
      padding: 9px 12px;
      font: inherit;
      font-size: 14px;
      color: #1f2329;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus, textarea:focus { border-color: #1456f0; }
    textarea { resize: vertical; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .btn-primary { background: #1456f0; color: #fff; }
    .btn-primary:hover { background: #0f48d8; }
    .btn-ghost { background: #fff; color: #1f2329; border: 1px solid #dee0e3; }
    .btn-ghost:hover { border-color: #1456f0; color: #1456f0; }
    .btn-block { width: 100%; }
    .btn-sm { font-size: 12px; padding: 4px 12px; }

    .shell { display: flex; min-height: 100vh; }

    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #fff;
      border-right: 1px solid #dee0e3;
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      overflow-y: auto;
      z-index: 100;
    }
    .sidebar-brand {
      padding: 20px 16px 14px;
      border-bottom: 1px solid #dee0e3;
    }
    .sidebar-brand .brand-label {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #646a73;
    }
    .sidebar-brand h2 {
      font-size: 18px;
      margin-top: 4px;
      color: #1f2329;
    }
    .sidebar-user {
      padding: 12px 16px;
      border-bottom: 1px solid #dee0e3;
      font-size: 13px;
      color: #646a73;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .sidebar-user .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ba471;
      flex-shrink: 0;
    }
    .sidebar-nav { flex: 1; padding: 8px 0; }
    .nav-group { padding: 0 8px; }
    .nav-btn {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 12px;
      margin: 2px 0;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: #646a73;
      font: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      transition: all 0.12s;
    }
    .nav-btn:hover { background: #f2f3f5; color: #1f2329; }
    .nav-btn.active { background: #e8f0ff; color: #1456f0; font-weight: 700; }
    .nav-btn .icon { font-size: 16px; width: 20px; text-align: center; flex-shrink: 0; }
    .nav-btn .text { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sidebar-footer {
      padding: 8px 8px 12px;
      border-top: 1px solid #dee0e3;
    }
    .sidebar-footer .nav-btn { color: #8f959e; font-size: 13px; padding: 8px 12px; }
    .sidebar-footer .nav-btn:hover { color: #646a73; }
    .sidebar-footer a { text-decoration: none; }

    .main {
      flex: 1;
      margin-left: 220px;
      padding: 24px 28px 40px;
      min-height: 100vh;
    }

    .page { display: none; }
    .page.active { display: block; }
    .page-header { margin-bottom: 20px; }
    .page-header h2 { font-size: 22px; margin: 0 0 4px; }
    .page-header p { color: #646a73; font-size: 13px; margin: 0; }

    .panel {
      background: #fff;
      border: 1px solid #dee0e3;
      border-radius: 8px;
      padding: 18px 20px;
      margin-bottom: 16px;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .panel-header h3 { font-size: 16px; margin: 0; }

    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: #f7f8fa;
      border: 1px solid #dee0e3;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .stat-card strong { display: block; font-size: 13px; color: #646a73; margin-bottom: 4px; }
    .stat-card div { font-size: 24px; font-weight: 700; color: #1f2329; }

    .timeline { display: grid; gap: 10px; }
    .timeline-item {
      background: #f7f8fa;
      border: 1px solid #dee0e3;
      border-radius: 8px;
      padding: 12px 14px;
    }
    .timeline-item strong { display: block; margin-bottom: 2px; }
    .timeline-item div { color: #646a73; font-size: 13px; }
    .timeline-item small { color: #8f959e; font-size: 12px; }

    .empty-state { color: #8f959e; font-size: 13px; padding: 24px 0; text-align: center; }

    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    label { display: block; margin-bottom: 12px; }
    label span { display: block; font-size: 13px; color: #646a73; margin-bottom: 6px; }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 16px;
      border-radius: 8px;
      background: #fff;
      color: #1f2329;
      border: 1px solid #dee0e3;
      border-left: 4px solid #1456f0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      z-index: 300;
      font-size: 14px;
    }

    .admin-tree-node {
      border: 1px solid #dee0e3;
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
    }
    .admin-tree-node summary {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    .admin-tree-node summary .tree-toggle {
      font-size: 12px;
      color: #8f959e;
      font-weight: 400;
    }
    .admin-tree-children {
      padding: 0 14px 10px;
    }
    .admin-tree-children .admin-tree-node {
      background: #f7f8fa;
    }

    @media (max-width: 900px) {
      .sidebar { width: 60px; min-width: 60px; }
      .sidebar .brand-label, .sidebar h2, .sidebar-user,
      .nav-btn .text, .sidebar-footer .nav-btn .text { display: none; }
      .nav-btn { justify-content: center; padding: 12px; }
      .nav-btn .icon { font-size: 20px; width: auto; }
      .main { margin-left: 60px; padding: 16px; }
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="loginGate" class="login-gate">
    <div class="login-card">
      <div class="brand-chip">Zhuyu Education</div>
      <h1>学校管理员后台</h1>
      <p class="hint">管理员账号由环境变量初始化，用于维护教师、公告和总题库目录。</p>
      <label><span>邮箱</span><input id="loginEmail" placeholder="请输入管理员邮箱"></label>
      <label><span>密码</span><input id="loginPassword" type="password" placeholder="请输入密码"></label>
      <button id="loginButton" class="btn btn-primary btn-block">登录后台</button>
      <a class="text-link" href="/">返回首页</a>
    </div>
  </div>

  <div id="appMain" class="shell" style="display:none;">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-label">Zhuyu Education</div>
        <h2>管理员后台</h2>
      </div>
      <div class="sidebar-user">
        <div class="dot"></div>
        <span id="authStatus">未登录</span>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-group">
          <button class="nav-btn active" data-page="dashboard">
            <span class="icon">📊</span><span class="text">总览</span>
          </button>
          <button class="nav-btn" data-page="teachers">
            <span class="icon">👨‍🏫</span><span class="text">教师账号</span>
          </button>
          <button class="nav-btn" data-page="announcements">
            <span class="icon">📢</span><span class="text">公告</span>
          </button>
          <button class="nav-btn" data-page="questions">
            <span class="icon">📚</span><span class="text">题库总览</span>
          </button>
          <button class="nav-btn" data-page="knowledge">
            <span class="icon">🌐</span><span class="text">知识图谱</span>
          </button>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-btn" onclick="logout()">
          <span class="icon">🚪</span><span class="text">退出登录</span>
        </button>
        <a class="nav-btn" href="/">
          <span class="icon">🏠</span><span class="text">返回首页</span>
        </a>
      </div>
    </aside>

    <div class="main">
      <section class="page active" data-page="dashboard">
        <div class="page-header">
          <h2>📊 学校总览</h2>
          <p id="schoolNameView">加载中...</p>
        </div>
        <div id="adminSummaryView" class="stat-grid"></div>
      </section>

      <section class="page" data-page="teachers">
        <div class="page-header">
          <h2>👨‍🏫 教师账号</h2>
          <p>教师不能自行注册，由管理员统一创建账号。</p>
        </div>
        <div class="two-col">
          <section class="panel">
            <div class="panel-header"><h3>创建教师</h3></div>
            <label><span>姓名</span><input id="teacherNameInput" placeholder="请输入教师姓名"></label>
            <label><span>邮箱</span><input id="teacherEmailInput" placeholder="teacher@example.com"></label>
            <label><span>初始密码</span><input id="teacherPasswordInput" type="password" placeholder="至少 8 位"></label>
            <button id="createTeacherButton" class="btn btn-primary">创建教师账号</button>
          </section>
          <section class="panel">
            <div class="panel-header">
              <h3>教师列表</h3>
              <button id="reloadTeachersButton" class="btn btn-ghost btn-sm">刷新</button>
            </div>
            <div id="teacherListView" class="timeline empty-state">暂无教师</div>
          </section>
        </div>
      </section>

      <section class="page" data-page="announcements">
        <div class="page-header">
          <h2>📢 公告维护</h2>
          <p>公告面向当前学校维护。</p>
        </div>
        <div class="two-col">
          <section class="panel">
            <div class="panel-header"><h3>发布公告</h3></div>
            <label><span>标题</span><input id="announcementTitleInput" placeholder="请输入公告标题"></label>
            <label><span>内容</span><textarea id="announcementContentInput" rows="5" placeholder="请输入公告内容"></textarea></label>
            <button id="createAnnouncementButton" class="btn btn-primary">发布公告</button>
          </section>
          <section class="panel">
            <div class="panel-header">
              <h3>公告列表</h3>
              <button id="reloadAnnouncementsButton" class="btn btn-ghost btn-sm">刷新</button>
            </div>
            <div id="announcementListView" class="timeline empty-state">暂无公告</div>
          </section>
        </div>
      </section>

      <section class="page" data-page="questions">
        <div class="page-header">
          <h2>📚 题库总览</h2>
          <p>管理员查看总题库和三级目录归属，具体出题与审核由教师端完成。</p>
        </div>
        <div id="questionBankView" class="timeline empty-state">加载中...</div>
      </section>

      <section class="page" data-page="knowledge">
        <div class="page-header">
          <h2>🌐 知识图谱总览</h2>
          <p>按一级学科、二级年级模块、三级知识点展开。</p>
        </div>
        <div id="knowledgeTreeView" class="empty-state">加载中...</div>
      </section>
    </div>
  </div>

  <script src="/static/admin.js?v=20260413"></script>
</body>
</html>
